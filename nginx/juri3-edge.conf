map $http_upgrade $connection_upgrade {
  default upgrade;
  "" close;
}

# Useful when debugging "buttons do nothing" / slow requests from real browsers.
# Declared at http-context (conf.d files are included from http{}), not inside server{}.
log_format jurist3_main '$remote_addr - $remote_user [$time_local] "$request" '
                       '$status $body_bytes_sent "$http_referer" "$http_user_agent" '
                       'rt=$request_time urt=$upstream_response_time uct=$upstream_connect_time '
                       'uht=$upstream_header_time';

upstream jurist3_ui {
  server jurist3-ui:3000;
}

upstream jurist3_onlyoffice {
  server onlyoffice-documentserver:80;
}

server {
  listen 80;
  server_name _;

  # Logs go to docker logs (stdout/stderr).
  access_log /dev/stdout jurist3_main;
  error_log /dev/stderr info;

  client_max_body_size 100m;

  # OnlyOffice paths (serve these from DocumentServer)
  location ^~ /web-apps/ {
    proxy_pass http://jurist3_onlyoffice;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    # OnlyOffice ships many static assets; caching these drastically speeds up editor load.
    proxy_hide_header Cache-Control;
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable" always;
  }
  location ^~ /sdkjs/ {
    proxy_pass http://jurist3_onlyoffice;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    proxy_hide_header Cache-Control;
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable" always;
  }

  # Additional DocumentServer endpoints that may be requested by the editor runtime.
  location ^~ /docservice/ {
    proxy_pass http://jurist3_onlyoffice;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
  }
  location ^~ /cache/ {
    proxy_pass http://jurist3_onlyoffice;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
  }
  location ^~ /converter/ {
    proxy_pass http://jurist3_onlyoffice;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
  }
  location ^~ /spellchecker/ {
    proxy_pass http://jurist3_onlyoffice;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
  }
  location ^~ /hosting/ {
    proxy_pass http://jurist3_onlyoffice;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
  }
  location ^~ /example/ {
    proxy_pass http://jurist3_onlyoffice;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
  }
  location ^~ /coauthoring/ {
    proxy_pass http://jurist3_onlyoffice;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    proxy_buffering off;
  }
  location ^~ /fonts/ {
    proxy_pass http://jurist3_onlyoffice;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_hide_header Cache-Control;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable" always;
  }
  location ^~ /plugins/ {
    proxy_pass http://jurist3_onlyoffice;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_hide_header Cache-Control;
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable" always;
  }
  location = /healthcheck {
    proxy_pass http://jurist3_onlyoffice;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Default: app UI/API
  location / {
    proxy_pass http://jurist3_ui;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
