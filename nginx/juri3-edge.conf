map $http_upgrade $connection_upgrade {
  default upgrade;
  "" close;
}

upstream jurist3_ui {
  server jurist3-ui:3000;
}

upstream jurist3_onlyoffice {
  server onlyoffice-documentserver:80;
}

server {
  listen 80;
  server_name _;

  # OnlyOffice paths (serve these from DocumentServer)
  location ^~ /web-apps/ { proxy_pass http://jurist3_onlyoffice; }
  location ^~ /sdkjs/ { proxy_pass http://jurist3_onlyoffice; }
  location ^~ /coauthoring/ {
    proxy_pass http://jurist3_onlyoffice;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
  location ^~ /fonts/ { proxy_pass http://jurist3_onlyoffice; }
  location ^~ /plugins/ { proxy_pass http://jurist3_onlyoffice; }
  location = /healthcheck { proxy_pass http://jurist3_onlyoffice; }

  # Default: app UI/API
  location / {
    proxy_pass http://jurist3_ui;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

