services:
  jurist3-ui:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3002:3000"
    env_file:
      - .env
    networks:
      - default
      - platform_net
    restart: unless-stopped

  jurist3-db:
    image: postgres:16-alpine
    container_name: jurist3-db
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - jurist3_db:/var/lib/postgresql/data
    restart: unless-stopped

  onlyoffice-documentserver:
    image: onlyoffice/documentserver:latest
    container_name: jurist3-onlyoffice
    ports:
      - "8085:80"
    environment:
      - JWT_ENABLED=false
      - ALLOW_PRIVATE_IP_ADDRESS=true
      - ALLOW_META_IP_ADDRESS=true
    restart: unless-stopped

volumes:
  jurist3_db:

networks:
  platform_net:
    external: true
    name: platform_default
