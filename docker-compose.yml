services:
  jurist3-edge:
    image: nginx:alpine
    ports:
      - "127.0.0.1:3001:80"
    volumes:
      - ./nginx/juri3-edge.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - jurist3-ui
    restart: unless-stopped

  jurist3-ui:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    restart: unless-stopped

  jurist3-db:
    image: postgres:16-alpine
    container_name: jurist3-db
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - jurist3_db:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  jurist3_db:
