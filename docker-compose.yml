services:
  jurist3-edge:
    image: nginx:alpine
    ports:
      - "127.0.0.1:3001:80"
    volumes:
      - ./nginx/juri3-edge.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - jurist3-ui
      - onlyoffice-documentserver
    restart: unless-stopped

  jurist3-ui:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    restart: unless-stopped

  jurist3-db:
    image: postgres:16-alpine
    container_name: jurist3-db
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - jurist3_db:/var/lib/postgresql/data
    restart: unless-stopped

  onlyoffice-documentserver:
    image: onlyoffice/documentserver:latest
    container_name: jurist3-onlyoffice
    ports:
      - "127.0.0.1:8080:80"
    cpus: "${ONLYOFFICE_CPUS:-1.5}"
    mem_limit: "${ONLYOFFICE_MEM_LIMIT:-3g}"
    mem_reservation: "${ONLYOFFICE_MEM_RESERVATION:-512m}"
    pids_limit: ${ONLYOFFICE_PIDS_LIMIT:-200}
    shm_size: "${ONLYOFFICE_SHM_SIZE:-1g}"
    environment:
      - JWT_ENABLED=false
      - ALLOW_PRIVATE_IP_ADDRESS=true
      - ALLOW_META_IP_ADDRESS=true
    restart: unless-stopped

volumes:
  jurist3_db:
